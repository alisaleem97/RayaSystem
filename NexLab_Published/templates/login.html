<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexLab</title>
    <script src="/static/vendor/tailwind/tailwindcss.js"></script>
    <link href="/static/vendor/fonts/fonts.css" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">🔬 <span class="text-indigo-600">NEX</span>LAB</h1>
            <p class="text-slate-500 mt-2">Laboratory Information System</p>
        </div>
        
        {% if message_error %}
            <div class="mb-4 bg-red-100 border-l-4 border-red-500 text-red-700 p-4 rounded">
                <p>{{ message_error }}</p>
            </div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-slate-700 text-sm font-bold mb-2" for="username">Username</label>
                <input class="shadow-sm appearance-none border border-slate-300 rounded-lg w-full py-3 px-4 text-slate-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" 
                       id="username" name="username" type="text" placeholder="Enter username" required>
            </div>
            <div class="mb-6">
                <label class="block text-slate-700 text-sm font-bold mb-2" for="password">Password</label>
                <input class="shadow-sm appearance-none border border-slate-300 rounded-lg w-full py-3 px-4 text-slate-700 leading-tight focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent" 
                       id="password" name="password" type="password" placeholder="Enter password" required>
            </div>
            <div class="flex items-center justify-between">
                <button class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-lg w-full transition duration-300 transform hover:scale-105" type="submit">
                    Sign In
                </button>
            </div>
        </form>
        <p class="text-center text-slate-400 text-xs mt-8">
            &copy; 2026 NexLab System. Secure Access.
        </p>
    </div>
</body>
</html>
