<!-- templates/print_barcode.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Print Barcode - {{ patient.patient_id if patient else 'NexLab' }}</title>
    <style>
        @page {
            size: 4in 2in;
            margin: 0.1in;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: white;
            padding: 10px;
        }
        .barcode-container {
            width: 100%;
            height: 100%;
            border: 1px solid #000;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .patient-id {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .barcode-image {
            margin: 10px 0;
            max-width: 100%;
            height: auto;
        }
        .print-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 10px 20px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        @media print {
            .print-btn { display: none !important; }
            body { padding: 0; }
        }
    </style>
</head>
<body>
    <button class="print-btn" onclick="window.print()">🖨️ Print</button>
    
    <div class="barcode-container">
        <!-- Patient ID -->
        <div class="patient-id">
            Patient ID: {{ patient.patient_id if patient else 'N/A' }}
        </div>
        
        <!-- ✅ Barcode Image - Using barcode_data from backend -->
{% if barcode_data %}
    <img class="barcode-image" src="{{ barcode_data }}" alt="Barcode" />
{% else %}
    <div style="color: red;">⚠️ No barcode data</div>
{% endif %}
        
        <!-- Test Info -->
        {% if orders and orders|length > 0 %}
        <div style="margin-top: 10px; text-align: left; font-size: 12px;">
            <strong>Tests:</strong><br>
            {% for order in orders %}
                • {{ order.test.test_name if order.test else 'Unknown' }}<br>
            {% endfor %}
        </div>
        {% endif %}
    </div>
    
    <script>
        // Debug: Log if barcode_data is present
        console.log('Barcode data present:', '{{ barcode_data is not none and barcode_data != "" }}');
    </script>
</body>
</html>
