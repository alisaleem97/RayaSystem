<!-- templates/register_patient.html -->
{% extends "base.html" %}

{% block title %}Register Patient - NexLab{% endblock %}
{% block page_title %}Register New Patient{% endblock %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-slate-200 max-w-4xl">
    <div class="p-6 border-b border-slate-200">
        <h3 class="text-lg font-semibold text-slate-800">Patient Information</h3>
        <p class="text-sm text-slate-500">Enter patient demographic details</p>
    </div>
    
    <form method="POST" action="/patients/create" class="p-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Patient ID *</label>
                <input type="text" name="patient_id" required placeholder="e.g., PAT-2024-001" 
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                <input type="text" name="full_name" required placeholder="John Doe" 
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Date of Birth *</label>
                <input type="date" name="date_of_birth" required 
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Gender *</label>
                <select name="gender" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    <option value="">Select...</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Phone *</label>
                <input type="tel" name="phone" required placeholder="123456789" 
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" placeholder="patient@email.com" 
                       class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
            </div>
        </div>
        
        <div class="mt-6">
            <label class="block text-sm font-medium text-slate-700 mb-1">Address</label>
            <textarea name="address" rows="3" placeholder="Street, City, Country" 
                      class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
        </div>
        
        <div class="mt-6 flex items-center gap-3">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition duration-200">
                Save Patient
            </button>
            <a href="/" class="text-slate-600 hover:text-slate-800 font-medium">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
